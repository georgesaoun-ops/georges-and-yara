<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── CSS VARIABLES (overridden per-client by app.js) ── */
:root {
  --gold:      #c8a96a;
  --brown:     #74583e;
  --bg:        #fff7ee;
  --goldLight: #e8c97a;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin:0; padding:0; width:100%; min-height:100%; background-color:var(--bg); font-family:'EB Garamond',serif; text-align:center; color:var(--brown); }

#music-btn { position:fixed; bottom:28px; right:28px; z-index:999; width:46px; height:46px; border-radius:50%; border:1px solid rgba(200,169,106,0.6); background:rgba(255,247,238,0.85); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); color:var(--brown); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(116,88,62,0.12); transition:all 0.3s ease; padding:0; }
#music-btn:hover { border-color:var(--gold); box-shadow:0 4px 20px rgba(200,169,106,0.3); transform:scale(1.08); }
#music-btn svg { width:18px; height:18px; transition:opacity 0.3s ease; }

/* ── LANG SWITCHER ── */
#lang-switcher { position:fixed; top:20px; left:0; z-index:999; display:none; }
#lang-btn { font-family:'EB Garamond',serif; font-size:0.8rem; padding:8px 14px 8px 10px; border-radius:0 20px 20px 0; border:1px solid rgba(200,169,106,0.4); border-left:none; background:rgba(0,0,0,0.35); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); color:var(--gold); cursor:pointer; display:flex; align-items:center; gap:7px; letter-spacing:1px; transition:background 0.3s ease, border-color 0.3s ease; }
#lang-btn:hover { background:rgba(200,169,106,0.2); border-color:rgba(200,169,106,0.7); }
#lang-btn .lang-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); opacity:0.8; flex-shrink:0; }
#lang-menu { display:none; position:absolute; top:50%; left:calc(100% + 8px); transform:translateY(-50%); background:rgba(20,10,3,0.92); border:1px solid rgba(200,169,106,0.5); border-radius:16px; overflow:hidden; min-width:120px; }
.lang-option { padding:10px 18px; font-family:'EB Garamond',serif; font-size:0.9rem; color:rgba(255,255,255,0.8); cursor:pointer; letter-spacing:1px; text-align:left; transition:background 0.2s ease; }
.lang-option:hover { background:rgba(200,169,106,0.15); }
.lang-option.active { color:var(--gold); font-style:italic; }
.lang-divider { height:1px; background:rgba(200,169,106,0.3); margin:0 12px; }

/* ── LANDING ── */
#landing { position:fixed; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:60px; gap:16px; background-color:var(--bg); background-size:cover; background-position:center; z-index:100; animation:fadeInPage 1.2s ease forwards; }
.landing-tagline { font-size:1.2rem; font-style:italic; color:#ffffff; opacity:0.90; animation:riseIn 1.4s ease 0.7s both; margin-top:-8px; }
.landing-enter { font-family:'EB Garamond',serif; font-size:1rem; letter-spacing:3px; text-transform:uppercase; padding:12px 40px; border-radius:30px; border:1px solid rgba(255,255,255,0.7); background:transparent; color:#ffffff; cursor:pointer; transition:all 0.3s ease; animation:riseIn 1.4s ease 0.5s both; margin-top:auto; margin-bottom:60px; }
.landing-enter:hover { background:rgba(255,255,255,0.15); }
.ring-initials { animation:riseIn 1.4s ease 0.3s both; }
@keyframes fadeInPage { from{opacity:0} to{opacity:1} }
@keyframes riseIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
#landing.leaving { animation:fadeOut 0.7s ease forwards; }
@keyframes fadeOut { to{opacity:0;pointer-events:none} }
@keyframes rsvpReveal { from{opacity:0;filter:blur(6px);transform:translateY(10px);} to{opacity:1;filter:blur(0);transform:translateY(0);} }
.rsvp-reveal { animation:rsvpReveal 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }

/* ── INVITATION ── */
#invitation { position:relative; height:100svh; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
#carousel-bg-fixed { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; transform:translateZ(0); will-change:transform; }
#carousel-bg-fixed .carousel-slide { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity 1.8s ease; }
#carousel-bg-fixed .carousel-slide.active { opacity:1; }
#invitation-content { position:relative; z-index:2; }
#invitation-content > * { pointer-events:all; }

.snap-section { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; scroll-snap-align:start; }
.content-card { background:transparent; border-radius:24px; padding:40px 36px; width:90%; max-width:560px; display:flex; flex-direction:column; align-items:center; gap:16px; border:1px solid var(--gold); }
.hero-text { display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; }
.hero-middle { display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; }
.hero-middle .family { font-size:1.5rem; line-height:2; color:#ffffff; }
.hero-middle .invite-text { font-size:1.3rem; line-height:1.6; color:rgba(255,255,255,0.85); }
.hero-text .quote { margin-bottom:0; color:#ffffff; }
.hero-text hr.divider { border-top-color:var(--gold); margin:0; }

.countdown-inner { display:flex; gap:clamp(8px,4vw,28px); justify-content:center; flex-wrap:nowrap; width:100%; }
.cd-num { font-family:'Great Vibes',cursive; font-size:clamp(2rem,8vw,3.4rem); color:var(--brown); line-height:1; display:block; }
.cd-label { font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); display:block; }
#rsvp-countdown { direction:ltr; }
.divider { width:60%; border:none; border-top:1px solid var(--gold); margin:5px 0; }
.quote { font-size:1.2rem; font-style:italic; line-height:1.6; margin:0; }
.quote span { font-size:0.95rem; font-style:normal; }
.family { font-size:1.5rem; line-height:2; margin:0; }
.invite-text { font-size:1.3rem; line-height:1.6; margin:0; }
h1 { font-family:'Great Vibes',cursive; font-size:clamp(50px,12vw,110px); color:var(--brown); margin:0; line-height:1; white-space:nowrap; }

/* Inside content-card, override to white */
.content-card .venue-title,.content-card .venue-subtitle,.content-card .venue-name,.content-card .venue-date,.content-card .venue-address,.content-card .invite-text,.content-card p,.content-card h2,.content-card h3 { color:#ffffff; }
.content-card .venue-subtitle { color:rgba(255,255,255,0.65); }
.content-card .venue-address { color:rgba(255,255,255,0.85); }
.content-card .cd-num { color:var(--goldLight); }
.content-card .cd-label { color:var(--gold); }
.content-card .venue-card-divider { background:var(--gold); }
.content-card button.confirm,.content-card button.decline { border-color:var(--gold); color:#ffffff; }
.content-card button.confirm:hover,.content-card button.decline:hover,.content-card button.confirm.selected,.content-card button.decline.selected { background:var(--gold); color:white; }
.content-card #thank-you-msg { color:#ffffff; }
.content-card #changed-mind { color:rgba(255,255,255,0.8) !important; }
.content-card textarea { background:rgba(255,255,255,0.12); color:#ffffff; border:1px solid rgba(200,169,106,0.5); }
.content-card textarea::placeholder { color:rgba(255,255,255,0.5); }
.content-card .gift-inner { background:rgba(255,255,255,0.1); border:1px solid rgba(200,169,106,0.4); border-radius:16px; padding:20px 30px; width:100%; max-width:400px; overflow:hidden; }
.content-card .gift-inner p { color:#ffffff; margin:0; }
.content-card .gift-inner hr { border:none; border-top:1px solid var(--gold); margin:10px 0; opacity:0.5; }

/* Venue */
.venue-title { font-family:'Great Vibes',cursive; font-size:2.8rem; color:var(--brown); line-height:1; margin:0; }
.venue-subtitle { font-size:0.85rem; letter-spacing:3px; text-transform:uppercase; color:rgba(116,88,62,0.6); margin:0 0 12px; }
.venue-name { font-family:'Great Vibes',cursive; font-size:2rem; color:var(--brown); margin:0; }
.venue-card-divider { width:40px; height:1px; background:var(--gold); opacity:0.5; }
.venue-date { font-size:1rem; color:var(--brown); margin:0; }
.venue-address { font-size:0.95rem; color:var(--brown); margin:0; line-height:1.6; }

/* RSVP */
.rsvp-section { width:100%; display:flex; flex-direction:column; align-items:center; gap:15px; }
.rsvp-section p { font-size:1.15rem; color:#ffffff; margin:0; }
.rsvp-section #message, .rsvp-section #attending-question, .rsvp-section #reply-deadline, .rsvp-section #wishes-label { color:#ffffff; }
div.rsvp-buttons { display:flex; justify-content:center; gap:15px; }
button.confirm, button.decline { font-size:1rem; letter-spacing:2px; text-transform:uppercase; padding:10px 36px; border-radius:30px; border:1.5px solid var(--gold); cursor:pointer; transition:all 0.3s ease; background:transparent; color:var(--brown); font-family:'EB Garamond',serif; }
button.confirm:hover, button.decline:hover { background:var(--gold); color:white; border-color:var(--gold); }
button.confirm.selected, button.decline.selected { background:var(--gold); color:white; border-color:var(--gold); transform:scale(1.05); }
#thank-you-msg { font-size:1.1rem; color:var(--brown); font-style:italic; font-weight:bold; min-height:1.5em; transition:opacity 0.4s ease; opacity:0; }
#thank-you-msg.visible { opacity:1; }
textarea { width:100%; height:100px; padding:15px; font-size:1rem; border-radius:15px; border:none; background-color:#fff3f0; box-shadow:0 4px 15px rgba(0,0,0,0.1); resize:none; font-family:'EB Garamond',serif; }
button#submit { font-size:1.1rem; padding:15px 40px; border-radius:20px; border:none; cursor:pointer; width:70%; max-width:300px; color:white; background:var(--brown); box-shadow:0 6px 20px rgba(0,0,0,0.25); transition:all 0.3s ease; font-family:'EB Garamond',serif; }
button#submit:hover { transform:scale(1.05); }
button#submit:disabled { background:#d6ccc4; box-shadow:none; cursor:not-allowed; transform:none; opacity:0.45; color:#a89080; }
button#edit-btn { font-size:0.95rem; padding:8px 25px; border-radius:12px; border:1px solid var(--brown); background:white; color:var(--brown); cursor:pointer; font-family:'EB Garamond',serif; display:none; transition:all 0.2s ease; }
button#edit-btn:hover { background:#fff3f0; }
#message { font-size:1.2rem; color:var(--brown); }

/* Guest count */
#guest-count-section { display:none; width:100%; flex-direction:column; align-items:center; gap:10px; }
#guest-count-section .gc-divider { width:60%; border:none; border-top:1px solid rgba(200,169,106,0.3); }
#guest-count-section .gc-sentence { color:#ffffff; font-size:1rem; font-style:normal; letter-spacing:0; margin:0; display:flex; align-items:center; gap:10px; white-space:nowrap; justify-content:center; }
.gc-pill { background:rgba(200,169,106,0.2); border:1px solid var(--gold); border-radius:30px; padding:5px 20px; color:var(--goldLight); font-family:'EB Garamond',serif; font-size:1rem; cursor:pointer; transition:all 0.2s; position:relative; flex-shrink:0; min-width:50px; width:50px; }
.gc-dropdown { display:none; position:absolute; top:calc(100% + 8px); left:50%; transform:translateX(-50%); background:rgba(30,15,5,0.95); border:1px solid rgba(200,169,106,0.5); border-radius:16px; overflow:hidden; width:60px; z-index:10; }
.gc-dropdown.open { display:block; }
.gc-drop-item { padding:8px 0; color:rgba(255,255,255,0.75); font-family:'EB Garamond',serif; font-size:1rem; cursor:pointer; transition:background 0.15s; text-align:center; }
.gc-drop-item:hover { background:rgba(200,169,106,0.2); color:var(--goldLight); }
.gc-drop-item.active { color:var(--goldLight); background:rgba(200,169,106,0.15); }
.gc-drop-divider { height:1px; background:rgba(200,169,106,0.2); margin:0 12px; }

/* Maps btn */
.maps-btn { display:flex; align-items:center; gap:14px; padding:14px 24px; border-radius:16px; border:1px solid rgba(200,169,106,0.5); background:rgba(200,169,106,0.08); color:#ffffff; font-family:'EB Garamond',serif; text-decoration:none; transition:all 0.3s ease; margin-top:8px; width:100%; box-sizing:border-box; }
.maps-btn:hover { background:rgba(200,169,106,0.2); border-color:var(--gold); }
.maps-icon { width:38px; height:38px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.maps-icon svg { width:18px; height:18px; }
.maps-text { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
.maps-label { font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); }
.maps-name { font-size:1.05rem; }

/* Gift */
#section-gift .content-card { padding:28px 20px; }

/* Scroll animations */
.content-card, .hero-text { opacity:0; transform:translateY(30px); transition:opacity 0.7s ease,transform 0.7s ease; }
.content-card.visible, .hero-text.visible { opacity:1; transform:translateY(0); }

@media (max-width:768px) {
  .quote { font-size:clamp(1rem,3vw,1.2rem); }
  .family { font-size:clamp(1.2rem,4vw,2rem); }
  .invite-text { font-size:clamp(1.1rem,3.5vw,1.7rem); }
  .rsvp-section p { font-size:clamp(1rem,3vw,1.2rem); }
  .content-card { padding:clamp(20px,4vw,32px) clamp(16px,3vw,24px); }
  h1 { font-size:clamp(50px,14vw,100px); white-space:nowrap; }
  .rsvp-section { gap:10px; }
  textarea { height:70px; }
  button#submit { padding:10px 40px; }
}
@media (max-width:400px) {
  .rsvp-section { gap:8px; }
  textarea { height:60px; }
  .content-card { padding:16px 14px; }
  button#submit { padding:8px 40px; font-size:1rem; }
}
</style>
</head>
<body>

<!-- ── LANGUAGE SWITCHER ── -->
<div id="lang-switcher">
  <button id="lang-btn" onclick="toggleLangMenu()">
    <span class="lang-dot"></span>
    <span id="lang-label">EN</span>
  </button>
  <div id="lang-menu">
    <div class="lang-option active" onclick="selectLang('en','English',this)">English</div>
    <div class="lang-divider"></div>
    <div class="lang-option" onclick="selectLang('ar','العربية',this)">العربية</div>
  </div>
</div>

<!-- ── MUSIC ── -->
<audio id="bg-music" loop>
  <source id="bg-music-src" src="" type="audio/mpeg">
</audio>
<button id="music-btn" onclick="toggleMusic()" title="Music">
  <svg id="icon-playing" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <path d="M9 18V6l12-2v12" stroke="#c8a96a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="6" cy="18" r="3" stroke="#c8a96a" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="3" stroke="#c8a96a" stroke-width="1.5"/>
  </svg>
  <svg id="icon-muted" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;">
    <path d="M9 18V6l12-2v12" stroke="#b8a090" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="6" cy="18" r="3" stroke="#b8a090" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="3" stroke="#b8a090" stroke-width="1.5"/>
    <line x1="3" y1="3" x2="21" y2="21" stroke="#b8a090" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</button>

<!-- ── LANDING ── -->
<div id="landing">
  <div class="ring-initials">
    <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <circle cx="36" cy="36" r="33" fill="none" stroke="#c8a96a" stroke-width="1.2"/>
      <circle cx="36" cy="36" r="27" fill="none" stroke="rgba(200,169,106,0.4)" stroke-width="0.7"/>
      <text id="ring-initials-text" x="36" y="42" font-family="Great Vibes, cursive" font-size="18" fill="#74583e" text-anchor="middle">G&Y</text>
    </svg>
  </div>
  <p class="landing-tagline" id="landing-tagline"></p>
  <button class="landing-enter" onclick="enterInvitation()">Enter</button>
</div>

<!-- ── FIXED CAROUSEL BACKGROUND ── -->
<div id="carousel-bg-fixed" style="display:none;"></div>

<!-- ── INVITATION ── -->
<div id="invitation" style="display:none;">
  <div id="invitation-content">

    <!-- SECTION 1: Hero -->
    <div class="snap-section" style="justify-content:space-between; padding:80px 20px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <p class="quote" style="color:#ffffff;opacity:0.9;"></p>
        <hr class="divider" style="margin:8px 0 0 0;">
      </div>
      <p class="family" style="color:#ffffff;"></p>
      <p class="invite-text" style="color:rgba(255,255,255,0.85);"></p>
      <h1 id="couple-names" style="color:var(--goldLight);margin-bottom:40px;padding:0 10px 10px 15px;"></h1>
    </div>

    <!-- SECTION 2: Venue -->
    <div class="snap-section">
      <div class="content-card">
        <h2 class="venue-title">The Venue</h2>
        <img id="venue-img" src="" alt="" style="width:100%;max-width:340px;object-fit:contain;">
        <h3 class="venue-name" id="venue-name-title"></h3>
        <p id="venue-location" class="venue-address"></p>
        <div class="venue-card-divider"></div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
          <p id="venue-date" class="venue-date" style="margin:0;"></p>
          <p id="punctual-note" style="font-style:italic;font-size:0.9rem;opacity:0.8;color:rgba(255,255,255,0.8);margin:0;"></p>
          <p id="venue-note" style="font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0;margin-top:16px;font-weight:bold;"></p>
        </div>
        <a id="maps-btn" class="maps-btn" href="#" target="_blank" rel="noopener">
          <div class="maps-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
          </div>
          <div class="maps-text">
            <span class="maps-label">Find the venue</span>
            <span class="maps-name" id="maps-name"></span>
          </div>
        </a>
      </div>
    </div>

    <!-- SECTION 3: Gift Registry -->
    <div class="snap-section" id="section-gift" style="padding:40px 20px;justify-content:center;">
      <div class="content-card" style="gap:10px;">
        <h2 class="venue-title">Gift Registry</h2>
        <p class="invite-text" id="gift-intro" style="font-style:italic;opacity:0.85;line-height:1.8;text-align:center;"></p>
        <div id="gift-accounts" style="display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;"></div>
      </div>
    </div>

    <!-- SECTION 4: RSVP -->
    <div class="snap-section" style="min-height:100svh;">
      <div class="content-card rsvp-section">
        <div id="rsvp-countdown" style="display:none;flex-direction:column;align-items:center;gap:10px;width:100%;">
          <p style="font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0;">Counting Down</p>
          <div style="display:flex;gap:clamp(8px,4vw,28px);justify-content:center;width:100%;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
              <span id="cd-days" class="cd-num">0</span><span class="cd-label">Days</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
              <span id="cd-hours" class="cd-num">0</span><span class="cd-label">Hours</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
              <span id="cd-minutes" class="cd-num">0</span><span class="cd-label">Minutes</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
              <span id="cd-seconds" class="cd-num">0</span><span class="cd-label">Seconds</span>
            </div>
          </div>
          <hr style="width:60%;border:none;border-top:1px solid rgba(200,169,106,0.3);margin:0;">
        </div>

        <h2 class="venue-title">Honor us with your presence</h2>
        <div id="message"></div>
        <p id="attending-count" style="display:none;">Number of persons attending: <strong><span id="num-attending"></span></strong></p>
        <p id="attending-question">Are you attending?</p>
        <div class="rsvp-buttons">
          <button class="confirm" id="btn-yes" onclick="selectAttendance(true)">Yes</button>
          <button class="decline" id="btn-no" onclick="selectAttendance(false)">No</button>
        </div>

        <div id="guest-count-section">
          <hr class="gc-divider">
          <div class="gc-sentence">
            <span id="gc-before">We will be</span>
            <span class="gc-pill" id="gc-pill" onclick="toggleGcDrop(event)">
              <span id="gc-num"> </span>
              <div class="gc-dropdown" id="gc-drop"></div>
            </span>
            <span id="gc-after">attending</span>
          </div>
        </div>

        <p id="reply-deadline"></p>
        <div id="thank-you-msg"></div>
        <p id="changed-mind" style="font-size:1rem;font-style:italic;display:none;"></p>
        <button id="edit-btn" onclick="editResponse()">Edit</button>
        <p id="wishes-label">Share your love and wishes:</p>
        <textarea id="love-message" placeholder="Write your message here..."></textarea>
        <button id="submit" onclick="submitForm()" disabled>Submit</button>
      </div>
    </div>

  </div>
</div>

<!-- ── LOAD APP ENGINE ── -->
<script src="app.js"></script>

<script>
// ── All logic that was previously hardcoded, now uses window._cfg / window._guestName etc. ──

let musicPlaying = false;

function startMusicOnce() {
  const music = document.getElementById('bg-music');
  music.play().then(() => {
    document.getElementById('icon-playing').style.display='block';
    document.getElementById('icon-muted').style.display='none';
    musicPlaying=true;
  }).catch(()=>{});
  document.removeEventListener('click', startMusicOnce);
  document.removeEventListener('touchstart', startMusicOnce);
}
document.addEventListener('click', startMusicOnce);
document.addEventListener('touchstart', startMusicOnce);

window.addEventListener('load', () => {
  const music = document.getElementById('bg-music');
  music.play().then(() => {
    document.getElementById('icon-playing').style.display='block';
    document.getElementById('icon-muted').style.display='none';
    musicPlaying=true;
    document.removeEventListener('click', startMusicOnce);
    document.removeEventListener('touchstart', startMusicOnce);
  }).catch(()=>{});
});

function toggleMusic() {
  const music = document.getElementById('bg-music');
  if (musicPlaying) {
    music.pause();
    document.getElementById('icon-playing').style.display='none';
    document.getElementById('icon-muted').style.display='block';
    musicPlaying=false;
  } else {
    music.play();
    document.getElementById('icon-playing').style.display='block';
    document.getElementById('icon-muted').style.display='none';
    musicPlaying=true;
  }
}

function enterInvitation() {
  const music = document.getElementById('bg-music');
  music.play().then(() => {
    document.getElementById('icon-playing').style.display='block';
    document.getElementById('icon-muted').style.display='none';
    musicPlaying=true;
    document.removeEventListener('click', startMusicOnce);
    document.removeEventListener('touchstart', startMusicOnce);
  }).catch(()=>{});

  document.getElementById('carousel-bg-fixed').style.display='block';
  document.getElementById('invitation').style.display='block';
  document.getElementById('landing').classList.add('leaving');

  // Start carousel
  const slides = document.querySelectorAll('#carousel-bg-fixed .carousel-slide');
  let current = 0;
  if (slides.length > 1) {
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current+1) % slides.length;
      slides[current].classList.add('active');
    }, 4000);
  }

  setTimeout(() => {
    document.getElementById('landing').style.display='none';
    if (window._cfg && window._cfg.multilingual) {
      document.getElementById('lang-switcher').style.display='block';
    }
    window.scrollTo(0,0);
    initScrollAnimations();
  }, 700);
}

// Countdown
function updateCountdown() {
  if (!window._weddingDate) return;
  const diff = window._weddingDate - new Date();
  if (diff <= 0) {
    document.getElementById('cd-days').textContent='0';
    document.getElementById('cd-hours').textContent='0';
    document.getElementById('cd-minutes').textContent='0';
    document.getElementById('cd-seconds').textContent='🎉';
    return;
  }
  document.getElementById('cd-days').textContent    = Math.floor(diff/(1000*60*60*24));
  document.getElementById('cd-hours').textContent   = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById('cd-minutes').textContent = Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById('cd-seconds').textContent = Math.floor((diff%(1000*60))/1000);
}
updateCountdown();
setInterval(updateCountdown, 1000);

// RSVP logic
let attending = null;
let confirmedGuests = 0;

function selectAttendance(choice) {
  attending = choice;
  document.getElementById("btn-yes").classList.remove("selected");
  document.getElementById("btn-no").classList.remove("selected");
  const total = parseInt(window._guestCount) || 1;

  if (choice) {
    document.getElementById("btn-yes").classList.add("selected");
    if (total >= 2) {
      buildGcDropdown(total);
      document.getElementById("gc-drop").classList.remove("open");
      confirmedGuests = 0;
      document.getElementById("gc-num").textContent = "-";
      document.getElementById("guest-count-section").style.display = "flex";
      document.getElementById("submit").disabled = true;
    } else {
      confirmedGuests = 1;
      document.getElementById("guest-count-section").style.display = "none";
      document.getElementById("submit").disabled = false;
    }
  } else {
    document.getElementById("btn-no").classList.add("selected");
    document.getElementById("guest-count-section").style.display = "none";
    confirmedGuests = 0;
    document.getElementById("submit").disabled = false;
  }
}

function submitForm() {
  if (attending === null) return;
  const submitBtn = document.getElementById("submit");
  submitBtn.textContent = "Sending...";
  submitBtn.disabled = true;
  const total = parseInt(window._guestCount) || 1;
  const finalGuests = attending ? (total >= 2 ? confirmedGuests : 1) : 0;

  document.querySelector(".rsvp-buttons").style.display      = "none";
  document.getElementById("guest-count-section").style.display = "none";
  document.getElementById("love-message").style.display      = "none";
  document.getElementById("attending-question").style.display = "none";
  document.getElementById("reply-deadline").style.display    = "none";
  document.getElementById("wishes-label").style.display      = "none";
  submitBtn.style.display = "none";

  const rsvpCard = document.querySelector(".content-card.rsvp-section");
  rsvpCard.classList.remove("rsvp-reveal");
  void rsvpCard.offsetWidth;
  rsvpCard.classList.add("rsvp-reveal");

  if (attending) {
    document.getElementById("num-attending").textContent = finalGuests;
    document.getElementById("attending-count").style.display = "block";
    document.getElementById("rsvp-countdown").style.display  = "flex";
  }

  const lang = window._currentLang || "en";
  const t = window._translations[lang];
  const thankYouText = attending ? t.thankYouYes : t.thankYouNo;
  const msgEl = document.getElementById("thank-you-msg");
  msgEl.textContent = thankYouText;
  msgEl.classList.remove("visible");
  setTimeout(() => msgEl.classList.add("visible"), 10);

  document.getElementById("edit-btn").style.display    = "inline-block";
  document.getElementById("changed-mind").style.display = "block";

  const name = window._guestName;
  if (name) {
    localStorage.setItem("rsvp_submitted_" + name, "true");
    localStorage.setItem("rsvp_message_" + name, thankYouText);
  }

  // Send to Google Sheet
  if (window._cfg && window._cfg.scriptUrl) {
    fetch(window._cfg.scriptUrl, {
      method: "POST",
      body: JSON.stringify({
        name:           name || "Unknown",
        guests:         window._guestCount || "0",
        attending:      attending ? "Yes" : "No",
        confirmedGuests: finalGuests,
        message:        document.getElementById("love-message").value
      })
    }).catch(() => {});
  }
}

function editResponse() {
  const name = window._guestName;
  if (name) {
    localStorage.removeItem("rsvp_submitted_" + name);
    localStorage.removeItem("rsvp_message_" + name);
  }
  document.querySelector(".rsvp-buttons").style.display         = "flex";
  document.getElementById("love-message").style.display         = "block";
  document.getElementById("attending-question").style.display   = "block";
  document.getElementById("reply-deadline").style.display       = "block";
  document.getElementById("wishes-label").style.display         = "block";
  document.getElementById("guest-count-section").style.display  = "none";
  document.getElementById("rsvp-countdown").style.display       = "none";
  document.getElementById("submit").style.display               = "inline-block";
  document.getElementById("submit").disabled                    = true;
  document.getElementById("submit").textContent                 = "Submit";
  document.getElementById("edit-btn").style.display             = "none";
  document.getElementById("changed-mind").style.display         = "none";
  document.getElementById("attending-count").style.display      = "none";
  const msgEl = document.getElementById("thank-you-msg");
  msgEl.classList.remove("visible");
  msgEl.textContent = "";
  attending = null;
  confirmedGuests = 0;
  document.getElementById("btn-yes").classList.remove("selected");
  document.getElementById("btn-no").classList.remove("selected");
  document.getElementById("love-message").value = "";
}

function buildGcDropdown(total) {
  const drop = document.getElementById("gc-drop");
  drop.innerHTML = "";
  for (let i = 1; i <= total; i++) {
    if (i > 1) {
      const d = document.createElement("div");
      d.className = "gc-drop-divider";
      drop.appendChild(d);
    }
    const item = document.createElement("div");
    item.className = "gc-drop-item";
    item.textContent = i;
    item.onclick = (e) => {
      e.stopPropagation();
      confirmedGuests = i;
      document.getElementById("gc-num").textContent = i;
      document.querySelectorAll(".gc-drop-item").forEach(d => d.classList.remove("active"));
      item.classList.add("active");
      document.getElementById("gc-drop").classList.remove("open");
      document.getElementById("submit").disabled = false;
    };
    drop.appendChild(item);
  }
}

function toggleGcDrop(e) {
  e.stopPropagation();
  document.getElementById("gc-drop").classList.toggle("open");
}

document.addEventListener("click", function(e) {
  const pill = document.getElementById("gc-pill");
  if (pill && !pill.contains(e.target)) document.getElementById("gc-drop").classList.remove("open");
});

function initScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.content-card, .hero-text').forEach(el => observer.observe(el));
}

// ── Language switcher ──
function toggleLangMenu() {
  const menu = document.getElementById('lang-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function selectLang(lang, label, el) {
  document.getElementById('lang-label').textContent = lang === 'ar' ? 'AR' : 'EN';
  document.getElementById('lang-menu').style.display = 'none';
  document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  setLangContent(lang); // defined in app.js
}

document.addEventListener('click', function(e) {
  const switcher = document.getElementById('lang-switcher');
  if (switcher && !switcher.contains(e.target)) document.getElementById('lang-menu').style.display = 'none';
});
</script>
</body>
</html>
